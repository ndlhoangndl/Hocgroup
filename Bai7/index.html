<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dv1">
      <div class="dv">TRANSFORM - HOVER VÀO TỪNG Ô</div>
    </div>
    <div class="dv2">
      <span class="box box1">translate</span>
      <span class="box box2">rotate</span>
      <span class="box box3">scale</span>
      <span class="box box4">combine</span>
    </div>

    <div class="dv3">
      <div>OVERLAY EFFECT - HOVER VÀO CARD</div>
    </div>
    <div class="anh">
      <div class="anh1">
        <img src="anh1.jpg" alt="anh xe" />
      </div>
      <div class="anh2">
        <img src="anh2.jpg" alt="anh xe 2" />
      </div>
      <div class="anh3">
        <img src="anh3.jpeg" alt="anh xe 3" />
      </div>
    </div>

    <div class="animation">
      <p class="p1">@KEYFRAMES ANIMATION</p>
      <div class="ani-container">
        <div class="nbox bounce">bounce</div>
        <div class="nbox spin">spin</div>
        <div class="nbox pulse">pulse</div>
        <div class="nbox slidein">slidein</div>
      </div>
    </div>
    <div class="loaders">
      <p class="p1">CSS LOADERS (PURE CSS)</p>
      <div class="loader-container">
        <div class="loader-circle"></div>
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <div class="loader-bars">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </body>
</html>
